name: mhpmcounter9
description: mhpmcounter9 read instruction test
instruction_under_test: csrr rd, 0xB09
requires: []

sequence:
  - op: lui
    rd: random src_reg
    imm:
      random:
        min: 0x00000
        max: 0xFFFFF

  - op: addi
    rd: random unused
    rs1: src_reg
    imm:
      random:
        min: -2048
        max: 2047

  - op: addi
    rd: random unused2
    rs1: src_reg
    imm:
      random:
        min: -2048
        max: 2047

  - op: addi
    rd: random dst_reg
    rs1: src_reg
    imm:
      random:
        min: -2048
        max: 2047

  - op: csrr
    rd: random dst_reg
    format: "{op} {rd}, 0xB09"
